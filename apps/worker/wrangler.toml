name = "labqcpro-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "labqcpro-db"
database_id = "b641c185-2a03-4883-9dda-6f3dd22ad93b"

[vars]
CORS_ORIGIN = "https://labqcpro.pages.dev"

[triggers]
crons = ["0 6 * * 1"]

# R2 bucket — uncomment after enabling R2 in Cloudflare Dashboard
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "labqcpro-files"

# Secrets set via: wrangler secret put SECRET_NAME
# JWT_SECRET, ANTHROPIC_API_KEY, NOWPAYMENTS_API_KEY, NOWPAYMENTS_IPN_SECRET, RESEND_API_KEY
